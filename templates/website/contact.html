{% extends 'base.html' %}
{% load static %} <!-- **MANDATORY: always load static functions in index.html as well** -->
{% block content %}
<!-- start banner Area -->
<section class="relative about-banner">
    <div class="overlay overlay-bg"></div>
    <div class="container">
        <div class="row d-flex align-items-center justify-content-center">
            <div class="about-content col-lg-12">
                <h1 class="text-white">
                    Contact Us
                </h1>
                <p class="text-white link-nav"><a href="index.html">Home </a> <span class="lnr lnr-arrow-right"></span>
                    <a href="contact.html"> Contact Us</a></p>
            </div>
        </div>
    </div>
</section>
<!-- End banner Area -->

<!-- Start contact-page Area -->
<section class="contact-page-area section-gap">
    <div class="container">
        <div class="row">
            <div class="map-wrap" id="map" style="width:100%; height: 445px;"></div>
            <div class="col-lg-4 d-flex flex-column address-wrap">
                <div class="single-contact-address d-flex flex-row">
                    <div class="icon">
                        <span class="lnr lnr-home"></span>
                    </div>
                    <div class="contact-details">
                        <h5>Binghamton, New York</h5>
                        <p>
                            4343 Hinkle Deegan Lake Road
                        </p>
                    </div>
                </div>
                <div class="single-contact-address d-flex flex-row">
                    <div class="icon">
                        <span class="lnr lnr-phone-handset"></span>
                    </div>
                    <div class="contact-details">
                        <h5>00 (958) 9865 562</h5>
                        <p>Mon to Fri 9am to 6 pm</p>
                    </div>
                </div>
                <div class="single-contact-address d-flex flex-row">
                    <div class="icon">
                        <span class="lnr lnr-envelope"></span>
                    </div>
                    <div class="contact-details">
                        <h5>support@colorlib.com</h5>
                        <p>Send us your query anytime!</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <form action="mail.php" class="form-area contact-form text-right" id="myForm" method="post">
                    <div class="row">
                        <div class="col-lg-6 form-group">
                            <input class="common-input mb-20 form-control" name="name" onblur="this.placeholder = 'Enter your name'"
                                   onfocus="this.placeholder = ''" placeholder="Enter your name"
                                   required="" type="text">

                            <input class="common-input mb-20 form-control" name="email"
                                   onblur="this.placeholder = 'Enter email address'"
                                   onfocus="this.placeholder = ''" pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{1,63}$"
                                   placeholder="Enter email address" required="" type="email">

                            <input class="common-input mb-20 form-control" name="subject" onblur="this.placeholder = 'Enter subject'"
                                   onfocus="this.placeholder = ''" placeholder="Enter subject"
                                   required="" type="text">
                        </div>
                        <div class="col-lg-6 form-group">
                            <textarea class="common-textarea form-control" name="message" onblur="this.placeholder = 'Enter Messege'"
                                      onfocus="this.placeholder = ''" placeholder="Enter Messege"
                                      required=""></textarea>
                        </div>
                        <div class="col-lg-12">
                            <div class="alert-msg" style="text-align: left;"></div>
                            <button class="genric-btn primary" style="float: right;">Send Message</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
<!-- End contact-page Area -->
{% endblock %}
